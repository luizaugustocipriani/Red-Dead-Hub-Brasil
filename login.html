<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Dead Hub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<main class="container text-center my-5">
    <div class="bg-card-custom p-5 rounded border-danger-custom max-width-text mx-auto shadow-lg">
        <h2 class="text-danger-custom font-cinzel mb-4">Identifique-se, Foragido</h2>
        <form id="form-login">
            <div class="mb-3 text-start">
                <label class="form-label text-light">Usuário (admin ou user)</label>
                <input type="text" id="login-usuario" class="form-control" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-light">Senha (123)</label>
                <input type="password" id="login-senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-danger-custom w-100 py-2">Entrar no Saloon</button>
        </form>
    </div>
</main>
<script>
    document.getElementById("form-login").addEventListener("submit", async function(e) {
        e.preventDefault();
        const userIn = document.getElementById("login-usuario").value;
        const passIn = document.getElementById("login-senha").value;
        const res = await fetch(`http://localhost:3000/usuarios?login=${userIn}&senha=${passIn}`);
        const usuarios = await res.json();
        if (usuarios.length > 0) {
            sessionStorage.setItem("usuarioLogado", JSON.stringify(usuarios[0]));
            window.location.href = "index.html";
        } else {
            alert("❌ Credenciais inválidas!");
        }
    });
</script>
</body>
</html>
